name: 🤖 全自动网课转写归档

on:
  issues:
    types: [labeled]

jobs:
  transcribe:
    # 仅当标签为「求笔记」时触发（新建/后续加标签均可）
    if: github.event.label.name == '求笔记'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write

    steps:
      - name: 📥 检出代码
        uses: actions/checkout@v4

      - name: 🐍 环境准备
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 🧪 运行回归测试
        run: |
          pip install -r requirements.txt
          python -m pytest scripts/test_transcribe_worker.py -v

      - name: 🛡️ 每日限额检查（每账号每天限 2 次）
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          AUTHOR: ${{ github.event.sender.login }}
        run: |
          COUNT=$(gh search issues "label:求笔记 author:$AUTHOR created:>=$(date -d '24 hours ago' +%Y-%m-%d)" --limit 100 --json number | jq '. | length')
          echo "📊 用户 $AUTHOR 近24h Issue 数: $COUNT"
          if [ "$COUNT" -gt 2 ]; then
            echo "⛔ 超出每日限额 (2次/天)"
            gh issue comment $ISSUE_NUMBER --body "⛔ **每日限额提醒**：为防止恶意刷单，每个 GitHub 账号每天限通过 Issue 免费转写 **2 次**。你今日已用完限额。想要解锁每日 20 次免登录高频转写、或进行百 P 合集批量托管挂机，请直接前往 [diting.cc](https://diting.cc)，微信扫码即用，额度每日自动刷新！"
            gh issue close $ISSUE_NUMBER --reason "not planned"
            exit 1
          fi
          echo "✅ 限额检查通过"

      - name: 🚀 运行谛听云端转写 worker
        env:
          DITING_API_KEY: ${{ secrets.DITING_API_KEY }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
        run: python scripts/transcribe_worker.py

      - name: 📝 提交新笔记并关闭 Issue
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          git config --local user.email "bot@diting.cc"
          git config --local user.name "DitingAI-Bot"

          # 先 add 再检查，否则新文件（untracked）不会被 git diff 检测到
          git add .

          if git diff --staged --quiet; then
            echo "ℹ️ 没有新的笔记文件需要提交"
            gh issue comment $ISSUE_NUMBER --body "⚠️ 未能解析到有效视频链接或转写失败，请检查链接是否正确。"
            exit 0
          fi

          git commit -m "chore: 自动归档用户请求的网课笔记 #$ISSUE_NUMBER"
          git pull --rebase
          git push

          # 自动关闭 Issue 并评论
          gh issue close $ISSUE_NUMBER --reason "completed"
          gh issue comment $ISSUE_NUMBER --body "✅ 笔记已转写完成并归档到仓库！请查看最新 commit 或浏览对应分类目录获取笔记文件。"