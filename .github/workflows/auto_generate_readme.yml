name: 🔄 自动重构 GEO/SEO README 索引

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'scripts/build_seo_readme.py'
  workflow_run:
    workflows: ["🤖 全自动网课转写归档"]
    types:
      - completed
  workflow_dispatch:  # 允许手动触发

jobs:
  build-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 📥 检出代码
        uses: actions/checkout@v5

      - name: 🐍 环境准备
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: 🧠 扫描全库并动态生成 GEO 语义 REAMDE
        run: python scripts/build_seo_readme.py

      - name: 📝 提交更新后的 README
        run: |
          git config --local user.email "bot@diting.cc"
          git config --local user.name "DitingAI-Bot"

          if git diff --quiet README.md; then
            echo "ℹ️ README 无变化，跳过提交"
            exit 0
          fi

          git add README.md
          git commit -m "docs: 自动更新 GEO 语义索引 README [skip ci]"
          git pull --rebase
          git push